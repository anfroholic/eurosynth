<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#334155"/>
    </marker>
    <style>
      .lbl{font-size:13px;fill:#0f172a}
      .sub{font-size:11px;fill:#475569}
      .pin{font-size:12px;fill:#1e293b;font-family:Consolas,monospace}
      .ttl{font-size:15px;font-weight:700;fill:#0f172a}
      .net{stroke:#334155;stroke-width:1.5;fill:none}
      .clk{stroke:#b45309;stroke-width:1.8;fill:none}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#f8fafc"/>
  <text x="24" y="34" class="ttl" font-size="19">EuroSynth voice chip — architecture (silicon top = <tspan font-family="Consolas,monospace">chip_top</tspan>)</text>
  <text x="24" y="54" class="sub">One bulletproof spine (timing + mux + serializer); sound engines hang off it as isolated leaves. Karplus-Strong is engine #1.</text>

  <!-- INPUT PADS -->
  <rect x="20" y="90" width="150" height="250" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="95" y="110" text-anchor="middle" class="lbl" font-weight="700">INPUT PADS</text>
  <text x="30" y="140" class="pin">clk_PAD</text><text x="30" y="154" class="sub">12.288 MHz (Schmitt)</text>
  <text x="30" y="178" class="pin">rst_n_PAD</text><text x="30" y="192" class="sub">active-low reset</text>
  <text x="30" y="216" class="pin">voice_sel[2:0]</text><text x="30" y="230" class="sub">input_PAD[2:0]</text>
  <text x="30" y="254" class="pin">bypass_en</text><text x="30" y="268" class="sub">input_PAD[3]</text>
  <text x="30" y="292" class="pin">ks_pluck</text><text x="30" y="306" class="sub">bidir_PAD[5] (in)</text>
  <text x="30" y="324" class="pin">ks_period[9:0]</text><text x="30" y="338" class="sub">bidir_PAD[15:6] (in)</text>

  <!-- SPINE container -->
  <rect x="250" y="80" width="430" height="430" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
  <text x="465" y="104" text-anchor="middle" class="ttl">synth_spine  (the backbone)</text>

  <!-- tick gen -->
  <rect x="270" y="120" width="180" height="64" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="360" y="146" text-anchor="middle" class="lbl" font-weight="700">BCLK divider + tick gen</text>
  <text x="360" y="164" text-anchor="middle" class="sub">clk/32 = BCLK; clk/1024 = sample_tick</text>

  <!-- voice mux -->
  <rect x="470" y="210" width="190" height="150" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="565" y="232" text-anchor="middle" class="lbl" font-weight="700">voice mux</text>
  <text x="565" y="248" text-anchor="middle" class="sub">exactly ONE source wins</text>
  <text x="482" y="272" class="pin" font-size="11">0  bypass ramp (saw)</text>
  <text x="482" y="290" class="pin" font-size="11">1  saw osc</text>
  <text x="482" y="308" class="pin" font-size="11">2  square osc</text>
  <text x="482" y="326" class="pin" font-size="11">3  silence</text>
  <text x="482" y="344" class="pin" font-size="11" fill="#9d174d" font-weight="700">4  Karplus-Strong</text>

  <!-- engines column -->
  <rect x="270" y="210" width="170" height="40" rx="6" fill="#ecfeff" stroke="#0891b2"/>
  <text x="355" y="235" text-anchor="middle" class="sub">bypass ramp / saw / square</text>

  <!-- KS engine -->
  <rect x="270" y="262" width="170" height="98" rx="8" fill="#fdf2f8" stroke="#db2777"/>
  <text x="355" y="282" text-anchor="middle" class="lbl" font-weight="700" fill="#9d174d">ks_engine (voice 4)</text>
  <text x="280" y="302" class="sub">LFSR noise burst  ──▶</text>
  <text x="280" y="320" class="sub">delay line 256×16 ("string")</text>
  <text x="280" y="338" class="sub">2-tap avg × decay (≈0.4998)</text>
  <text x="280" y="354" class="sub">f ≈ fs / period</text>

  <!-- serializer -->
  <rect x="470" y="120" width="190" height="64" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="565" y="146" text-anchor="middle" class="lbl" font-weight="700">I2S serializer</text>
  <text x="565" y="164" text-anchor="middle" class="sub">32-bit frame, MSB-first, 16L+16R</text>

  <!-- internal arrows -->
  <line x1="440" y1="232" x2="470" y2="270" class="net" marker-end="url(#arr)"/>
  <line x1="440" y1="300" x2="470" y2="300" class="net" marker-end="url(#arr)"/>
  <line x1="565" y1="210" x2="565" y2="184" class="net" marker-end="url(#arr)"/>
  <text x="600" y="200" class="sub">sample</text>
  <line x1="360" y1="184" x2="360" y2="210" class="clk" marker-end="url(#arr)"/>
  <path d="M360 200 H705 V300" class="clk" marker-end="url(#arr)"/>
  <text x="712" y="304" class="sub" fill="#b45309">sample_tick</text>

  <!-- input nets into spine -->
  <line x1="170" y1="140" x2="270" y2="150" class="clk" marker-end="url(#arr)"/>
  <line x1="170" y1="216" x2="470" y2="220" class="net" marker-end="url(#arr)"/>
  <line x1="170" y1="298" x2="270" y2="300" class="net" marker-end="url(#arr)"/>

  <!-- OUTPUT PADS -->
  <rect x="760" y="90" width="180" height="420" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="850" y="110" text-anchor="middle" class="lbl" font-weight="700">OUTPUT PADS (bidir)</text>
  <text x="772" y="150" class="pin">i2s_sd</text><text x="772" y="164" class="sub">bidir_PAD[0] → DAC</text>
  <text x="772" y="190" class="pin">i2s_bclk</text><text x="772" y="204" class="sub">bidir_PAD[1]</text>
  <text x="772" y="230" class="pin">i2s_ws / LRCK</text><text x="772" y="244" class="sub">bidir_PAD[2]</text>
  <text x="772" y="272" class="pin">heartbeat</text><text x="772" y="286" class="sub">bidir_PAD[3] → LED</text>
  <text x="772" y="312" class="pin">sample_tick</text><text x="772" y="326" class="sub">bidir_PAD[4] → scope/DAC latch</text>
  <text x="772" y="356" class="pin">sample_dbg[15:0]</text><text x="772" y="370" class="sub">bidir_PAD[31:16]</text>
  <text x="772" y="384" class="sub">parallel sample → R-2R DAC</text>
  <line x1="772" y1="404" x2="928" y2="404" stroke="#10b981" stroke-dasharray="3 3"/>
  <text x="772" y="430" class="pin">bidir_PAD[45:32]</text><text x="772" y="444" class="sub">spare (drive 0)</text>
  <text x="772" y="470" class="pin">analog[3:0]</text><text x="772" y="484" class="sub">reserved 5V analog pads</text>

  <line x1="660" y1="150" x2="760" y2="150" class="net" marker-end="url(#arr)"/>
  <line x1="660" y1="300" x2="760" y2="320" class="clk" marker-end="url(#arr)"/>

  <text x="24" y="560" class="sub">5 V CMOS logic · gf180mcu_fd_sc_mcu7t5v0 std cells · gf180mcu_fd_io 5 V pads · die 3.93 mm × 2.53 mm</text>
  <text x="24" y="580" class="sub">Isolation rule: a bug in any one engine cannot reach the output unless its voice is selected — bounded blast radius.</text>
</svg>
