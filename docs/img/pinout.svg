<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <style>
    .ttl{font-size:19px;font-weight:700;fill:#0f172a}
    .sub{font-size:12px;fill:#475569}
    .pin{font-size:12px;fill:#0f172a;font-family:Consolas,monospace}
    .grp{font-size:13px;font-weight:700;fill:#0f172a}
    .pad{stroke:#334155;stroke-width:1}
  </style>
  <rect x="0" y="0" width="980" height="700" fill="#f8fafc"/>
  <text x="24" y="34" class="ttl">EuroSynth — functional pad map (SLOT 1x0p5: 4 input · 46 bidir · 4 analog · 16 power)</text>
  <text x="24" y="54" class="sub">Pad electrical types: clk = Schmitt input · rst_n &amp; input_PAD = plain 5 V input · bidir = 24 mA 5 V tri-state · analog = 5 V analog</text>

  <!-- die -->
  <rect x="300" y="150" width="380" height="380" rx="6" fill="#fffbeb" stroke="#ca8a04" stroke-width="2"/>
  <text x="490" y="330" text-anchor="middle" class="grp" font-size="22" fill="#a16207">chip_top</text>
  <text x="490" y="356" text-anchor="middle" class="sub">synth_spine + ks_engine</text>
  <text x="490" y="376" text-anchor="middle" class="sub">3.93 mm × 2.53 mm · 5 V</text>

  <!-- LEFT side: clk, rst, inputs -->
  <text x="40" y="150" class="grp" fill="#4338ca">CLOCK / RESET / CONTROL IN</text>
  <g>
    <rect x="270" y="175" width="30" height="14" class="pad" fill="#c7d2fe"/><text x="40" y="186" class="pin">clk_PAD &lt;- 12.288 MHz osc</text>
    <rect x="270" y="205" width="30" height="14" class="pad" fill="#c7d2fe"/><text x="40" y="216" class="pin">rst_n_PAD &lt;- reset circuit</text>
    <rect x="270" y="245" width="30" height="14" class="pad" fill="#c7d2fe"/><text x="40" y="256" class="pin">input_PAD[0] = voice_sel[0]</text>
    <rect x="270" y="270" width="30" height="14" class="pad" fill="#c7d2fe"/><text x="40" y="281" class="pin">input_PAD[1] = voice_sel[1]</text>
    <rect x="270" y="295" width="30" height="14" class="pad" fill="#c7d2fe"/><text x="40" y="306" class="pin">input_PAD[2] = voice_sel[2]</text>
    <rect x="270" y="320" width="30" height="14" class="pad" fill="#c7d2fe"/><text x="40" y="331" class="pin">input_PAD[3] = bypass_en</text>
  </g>

  <!-- KS control on bidir (inputs) -->
  <text x="40" y="375" class="grp" fill="#9d174d">KS CONTROL (bidir set as input)</text>
  <g>
    <rect x="270" y="395" width="30" height="14" class="pad" fill="#fbcfe8"/><text x="40" y="406" class="pin">bidir_PAD[5] = ks_pluck</text>
    <rect x="270" y="420" width="30" height="14" class="pad" fill="#fbcfe8"/><text x="40" y="431" class="pin">bidir_PAD[6]  = ks_period[0] (LSB)</text>
    <rect x="270" y="445" width="30" height="14" class="pad" fill="#fbcfe8"/><text x="40" y="456" class="pin">  ...   (period[1..8])  ...</text>
    <rect x="270" y="470" width="30" height="14" class="pad" fill="#fbcfe8"/><text x="40" y="481" class="pin">bidir_PAD[15] = ks_period[9] (MSB)</text>
  </g>

  <!-- RIGHT side: audio + debug outputs -->
  <text x="700" y="150" class="grp" fill="#047857">AUDIO + STATUS OUT (bidir = output)</text>
  <g>
    <rect x="680" y="175" width="30" height="14" class="pad" fill="#a7f3d0"/><text x="716" y="186" class="pin">bidir_PAD[0] = i2s_sd</text>
    <rect x="680" y="200" width="30" height="14" class="pad" fill="#a7f3d0"/><text x="716" y="211" class="pin">bidir_PAD[1] = i2s_bclk</text>
    <rect x="680" y="225" width="30" height="14" class="pad" fill="#a7f3d0"/><text x="716" y="236" class="pin">bidir_PAD[2] = i2s_ws (LRCK)</text>
    <rect x="680" y="250" width="30" height="14" class="pad" fill="#a7f3d0"/><text x="716" y="261" class="pin">bidir_PAD[3] = heartbeat -&gt; LED</text>
    <rect x="680" y="275" width="30" height="14" class="pad" fill="#a7f3d0"/><text x="716" y="286" class="pin">bidir_PAD[4] = sample_tick</text>
  </g>
  <text x="716" y="330" class="grp" fill="#047857">PARALLEL SAMPLE OUT</text>
  <g>
    <rect x="680" y="345" width="30" height="14" class="pad" fill="#6ee7b7"/><text x="716" y="356" class="pin">bidir_PAD[16] = sample_dbg[0]</text>
    <rect x="680" y="370" width="30" height="14" class="pad" fill="#6ee7b7"/><text x="716" y="381" class="pin">  ... 16-bit signed mirror ...</text>
    <rect x="680" y="395" width="30" height="14" class="pad" fill="#6ee7b7"/><text x="716" y="406" class="pin">bidir_PAD[31] = sample_dbg[15]</text>
  </g>
  <text x="716" y="450" class="grp" fill="#64748b">SPARE / RESERVED</text>
  <g>
    <rect x="680" y="465" width="30" height="14" class="pad" fill="#e2e8f0"/><text x="716" y="476" class="pin">bidir_PAD[45:32] = spare (drive 0)</text>
    <rect x="680" y="490" width="30" height="14" class="pad" fill="#fde68a"/><text x="716" y="501" class="pin">analog_PAD[3:0] = reserved 5 V</text>
  </g>

  <!-- TOP side: power -->
  <text x="300" y="120" class="grp" fill="#334155">POWER (tie all together): VDD/DVDD = +5 V · VSS/DVSS = 0 V</text>
  <g>
    <rect x="330" y="143" width="14" height="14" class="pad" fill="#cbd5e1"/>
    <rect x="360" y="143" width="14" height="14" class="pad" fill="#cbd5e1"/>
    <rect x="390" y="143" width="14" height="14" class="pad" fill="#cbd5e1"/>
    <rect x="420" y="143" width="14" height="14" class="pad" fill="#94a3b8"/>
    <rect x="450" y="143" width="14" height="14" class="pad" fill="#cbd5e1"/>
    <rect x="480" y="143" width="14" height="14" class="pad" fill="#94a3b8"/>
    <rect x="510" y="143" width="14" height="14" class="pad" fill="#cbd5e1"/>
    <rect x="540" y="143" width="14" height="14" class="pad" fill="#94a3b8"/>
    <rect x="570" y="143" width="14" height="14" class="pad" fill="#cbd5e1"/>
    <rect x="600" y="143" width="14" height="14" class="pad" fill="#94a3b8"/>
    <rect x="630" y="143" width="14" height="14" class="pad" fill="#cbd5e1"/>
  </g>
  <text x="330" y="138" class="sub">7× DVDD, 7× DVSS, 1× VDD, 1× VSS  (decouple every pad)</text>

  <!-- legend -->
  <text x="24" y="560" class="grp">Legend</text>
  <rect x="24" y="572" width="16" height="12" fill="#c7d2fe" class="pad"/><text x="46" y="582" class="sub">5 V input</text>
  <rect x="130" y="572" width="16" height="12" fill="#fbcfe8" class="pad"/><text x="152" y="582" class="sub">bidir as input (KS control)</text>
  <rect x="350" y="572" width="16" height="12" fill="#a7f3d0" class="pad"/><text x="372" y="582" class="sub">bidir as output</text>
  <rect x="500" y="572" width="16" height="12" fill="#fde68a" class="pad"/><text x="522" y="582" class="sub">analog</text>
  <rect x="600" y="572" width="16" height="12" fill="#cbd5e1" class="pad"/><text x="622" y="582" class="sub">power/ground</text>

  <text x="24" y="620" class="sub">Direction mask is fixed in silicon: bidir bits [4:0] and [31:16] (+[45:32]) are OUTPUTS; bits [15:5] are INPUTS. You cannot reconfigure it on the board.</text>
  <text x="24" y="640" class="sub">"Hello world": power + clock + reset + bypass_en=1 → a 187 Hz sawtooth appears on the audio output, proving the chip is alive.</text>
  <text x="24" y="660" class="sub">Pad bit numbers are the logical bus indices in chip_core.sv. Map them to physical package pins via the wafer.space slot/bond-out sheet.</text>
</svg>
